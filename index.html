<!DOCTYPE html>

<head>

    <!-- Google Fonts for Rockstar Vibe -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        tailwind.config = {

                extend: {

    <!-- Custom Styles & Animations -->
    <style>
        body {
            background-color: #050507;
            color: #e2e8f0;
        }
        /* Custom Vice City Scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.3);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, #ff00b3, #7000ff);
            border-radius: 10px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        /* Background Ambient Orbs */
        .ambient-orb-1 {
            position: fixed; top: -10%; left: -10%; width: 50vw; height: 50vw;
            background: radial-gradient(circle, rgba(255,0,179,0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: -1; pointer-events: none;
        }
        .ambient-orb-2 {
            position: fixed; bottom: -20%; right: -10%; width: 60vw; height: 60vw;
            background: radial-gradient(circle, rgba(0,240,255,0.1) 0%, rgba(0,0,0,0) 70%);
            z-index: -1; pointer-events: none;
        }
        .dark .ambient-orb-1 { background: radial-gradient(circle, rgba(112,0,255,0.15) 0%, rgba(0,0,0,0) 70%); }
        .dark .ambient-orb-2 { background: radial-gradient(circle, rgba(255,94,0,0.1) 0%, rgba(0,0,0,0) 70%); }

        /* News Sliding Animation */
        @keyframes revealNews {
            0%, 15% { left: 0%; transform: translateX(0%); }
            85%, 100% { left: 100%; transform: translateX(-100%); }
        }
        .animate-reveal-news {
            position: relative;
            display: inline-block;
            white-space: nowrap;
            animation: revealNews 12s ease-in-out forwards;
        }
    </style>

    <!-- Import maps for React and Lucide Icons -->
    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.2.0",
                "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
                "lucide-react": "https://esm.sh/lucide-react@0.294.0"
            }
        }

    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="transition-colors duration-500 selection:bg-gta-pink selection:text-white antialiased">
    
    <div class="ambient-orb-1"></div>
    <div class="ambient-orb-2"></div>

    <!-- App Entry Point -->
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          LayoutDashboard, Fingerprint, GraduationCap, Receipt, Plane, 
          PhoneCall, ShoppingCart, BookOpen, CreditCard, FolderLock, 
          Settings, Bell, Search, Sun, Moon, Eye, EyeOff, Menu, X,
          Plus, Check, Download, Upload, Shield, Trash2, Calendar, MapPin, Pencil, Newspaper, ExternalLink, Activity, Globe, Link as LinkIcon
        } from 'lucide-react';

        // --- CUSTOM HOOKS ---
        function useLocalStorage(key, initialValue) {
          const [storedValue, setStoredValue] = useState(() => {
            try {
              const item = window.localStorage.getItem(key);
              return item ? JSON.parse(item) : initialValue;
            } catch (error) {
              console.error(error);
              return initialValue;
            }
          });

          const setValue = (value) => {
            try {
              const valueToStore = value instanceof Function ? value(storedValue) : value;
              setStoredValue(valueToStore);
              window.localStorage.setItem(key, JSON.stringify(valueToStore));
            } catch (error) {
              console.error(error);
            }
          };
          return [storedValue, setValue];
        }

        // --- MOCK / INITIAL DATA ---
        const INITIAL_DATA = {
          tasks: [
            { id: 1, title: 'Review LifeOS Code Architecture', completed: false, priority: 'high' },
            { id: 2, title: 'Call Client for Freelance Project', completed: true, priority: 'medium' },
            { id: 3, title: 'Buy Groceries', completed: false, priority: 'low' },
          ],
          bills: [
            { id: 1, name: 'Electricity Bill', amount: 1250, dueDate: '2026-06-01', cycle: '1 Month', paid: false },
            { id: 2, name: 'Mobile Recharge (Jio)', amount: 749, dueDate: '2026-05-15', cycle: '28 Days', paid: false },
            { id: 3, name: 'Internet (Airtel)', amount: 999, dueDate: '2026-06-15', cycle: '1 Month', paid: false },
          ],
          identity: [
            { id: 1, type: 'Aadhaar', number: '123456789012', name: 'Santhosh A' },
            { id: 2, type: 'PAN Card', number: 'ABCDE1234F', name: 'Santhosh A' },
          ],
          learning: [
            { id: 1, course: 'Advanced React Patterns', platform: 'Frontend Masters', progress: 75 },
            { id: 2, course: 'System Design Interview', platform: 'AlgoExpert', progress: 30 },
          ],
          subscriptions: [
            { id: 1, name: 'Netflix', cost: 199, cycle: 'Monthly' },
            { id: 2, name: 'GitHub Copilot', cost: 850, cycle: 'Monthly' },
          ],
          education: [{ id: 1, degree: 'B.Tech Computer Science', institution: 'Anna University', year: '2024', mark: '8.5 CGPA', project: 'LifeOS Digital Dashboard', note: 'First Class with Distinction' }],
          travel: [{ id: 1, destination: 'New York', date: '2026-06-15', type: 'Flight' }],
          calls: [{ id: 1, name: 'Santhosh (Client)', number: '+91 9876543210', completed: false }],
          shopping: [{ id: 1, item: 'Wireless Mouse', cost: 1500, budget: 2000, completed: false }],
          documents: [{ id: 1, name: 'Passport', expiry: '2030-01-01' }],
          links: [
            { id: 1, title: 'GitHub Daily Commit', url: 'https://github.com', priority: 'high', completed: false },
            { id: 2, title: 'University Portal', url: 'https://example.com', priority: 'normal', completed: true }
          ],
          quickLinks: [
            { id: 1, name: 'YouTube', url: 'https://youtube.com' },
            { id: 2, name: 'Google', url: 'https://google.com' },
            { id: 3, name: 'GitHub', url: 'https://github.com' },
            { id: 4, name: 'ChatGPT', url: 'https://chatgpt.com' }
          ]
        };

        // --- GTA STYLE COMPONENTS ---
        const WidgetCard = ({ children, className = "", colSpan = 1, rowSpan = 1, onClick }) => {
          const spanClasses = `col-span-1 md:col-span-${colSpan} row-span-${rowSpan}`;
          return (
            <div onClick={onClick} className={`relative overflow-hidden rounded-xl bg-gta-glass backdrop-blur-xl border border-white/5 shadow-[0_4px_30px_rgba(0,0,0,0.5)] transition-all duration-300 ease-out hover:-translate-y-1 hover:border-gta-cyan/40 hover:shadow-[0_0_20px_rgba(0,240,255,0.15)] p-6 group ${spanClasses} ${className}`}>
              {/* Internal subtle glow */}
              <div className="absolute inset-0 bg-gradient-to-br from-gta-pink/5 to-gta-cyan/5 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none"></div>
              <div className="relative z-10">{children}</div>
            </div>
          );
        };

        const GtaButton = ({ children, onClick, variant = 'primary', className = '' }) => {
          const baseClasses = "px-6 py-2.5 rounded-lg font-gta font-bold italic uppercase tracking-wider transition-all duration-300 flex items-center justify-center gap-2 text-sm shadow-lg";
          const variants = {
            primary: "bg-gradient-to-r from-gta-pink to-gta-purple text-white hover:from-gta-pink hover:to-gta-cyan hover:shadow-[0_0_15px_rgba(255,0,179,0.5)] border border-white/20",
            secondary: "bg-black/50 text-white border border-white/20 hover:border-gta-cyan hover:text-gta-cyan hover:shadow-[0_0_15px_rgba(0,240,255,0.3)]",
            danger: "bg-red-900/50 text-red-400 border border-red-500/30 hover:bg-red-600 hover:text-white hover:shadow-[0_0_15px_rgba(220,38,38,0.5)]"
          };
          return (
            <button onClick={onClick} className={`${baseClasses} ${variants[variant]} ${className}`}>
              {children}
            </button>
          );
        };

        const GtaInput = ({ ...props }) => (
          <input 
            {...props} 
            className={`flex-1 bg-black/60 border border-white/10 rounded-lg px-4 py-2.5 text-white placeholder-gray-500 outline-none focus:border-gta-cyan focus:ring-1 focus:ring-gta-cyan transition-all shadow-[inset_0_2px_4px_rgba(0,0,0,0.6)] ${props.className || ''}`}
          />
        );

        // --- MAIN APPLICATION ---
        function App() {
          const [activeTab, setActiveTab] = useState('dashboard');
          const [isSidebarOpen, setIsSidebarOpen] = useState(false);
          const [isDarkMode, setIsDarkMode] = useLocalStorage('lifeos_theme', true);
          const [isPrivacyMode, setIsPrivacyMode] = useState(false);
          
          // NEW SECURITY STATE (Edit vs Read-Only)
          const [isEditMode, setIsEditMode] = useLocalStorage('lifeos_edit_mode', false);

          const [userName, setUserName] = useLocalStorage('lifeos_username', 'Santhosh');
          const [appData, setAppData] = useLocalStorage('lifeos_user_data', INITIAL_DATA);
          const [isNotificationsOpen, setIsNotificationsOpen] = useState(false);
          const [activeIframeUrl, setActiveIframeUrl] = useState(null);

          useEffect(() => {
            if (isDarkMode) document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
          }, [isDarkMode]);

          const maskText = (text, type = 'default') => {
            if (!isPrivacyMode) return text;
            if (type === 'number') return 'XXXX XXXX ' + String(text).slice(-4);
            if (type === 'amount') return '₹ **.**';
            return '••••••••';
          };

          const checkDueStatus = (dateString) => {
            const due = new Date(dateString);
            const now = new Date();
            const diffDays = Math.ceil((due - now) / (1000 * 60 * 60 * 24));
            
            if (diffDays < 0) return { status: 'overdue', text: 'OVERDUE', color: 'text-red-400 border-red-500/50 bg-red-500/10' };
            if (diffDays <= 2) return { status: 'urgent', text: `${diffDays} DAYS LEFT`, color: 'text-gta-orange border-gta-orange/50 bg-gta-orange/10' };
            return { status: 'normal', text: `IN ${diffDays} DAYS`, color: 'text-gray-400 border-gray-600 bg-white/5' };
          };

          const getNotifications = () => {
            const notifs = [];
            // Alert for Urgent or Overdue Bills
            (appData.bills || []).forEach(bill => {
              if (!bill.paid) {
                const status = checkDueStatus(bill.dueDate);
                if (status.status !== 'normal') {
                  notifs.push({ 
                    id: `bill-${bill.id}`, 
                    title: `BILL ${status.status.toUpperCase()}`, 
                    message: `${bill.name} - ${maskText(bill.amount, 'amount')}`, 
                    time: status.text, 
                    color: status.status === 'overdue' ? 'text-red-500' : 'text-gta-orange', 
                    icon: Receipt 
                  });
                }
              }
            });
            // Alert for High Priority Tasks
            (appData.tasks || []).forEach(task => {
              if (!task.completed && task.priority === 'high') {
                notifs.push({ 
                  id: `task-${task.id}`, 
                  title: 'HIGH PRIORITY TASK', 
                  message: task.title, 
                  time: 'PENDING', 
                  color: 'text-gta-pink', 
                  icon: LayoutDashboard 
                });
              }
            });
            // Alert for High Priority Links
            (appData.links || []).forEach(link => {
              if (!link.completed && link.priority === 'high') {
                notifs.push({ 
                  id: `link-${link.id}`, 
                  title: 'MUST DO COMMLINK', 
                  message: link.title, 
                  time: 'ACTION REQUIRED', 
                  color: 'text-gta-cyan', 
                  icon: Globe 
                });
              }
            });
            return notifs;
          };

          const notifications = getNotifications();

          const getGreeting = () => {
            const hour = new Date().getHours();
            if (hour < 12) return 'GOOD MORNING';
            if (hour < 18) return 'GOOD AFTERNOON';
            return 'GOOD EVENING';
          };

          const navItems = [
            { id: 'dashboard', icon: LayoutDashboard, label: 'DASHBOARD' },
            { id: 'news', icon: Newspaper, label: 'LIVE NEWS' },
            { id: 'links', icon: Globe, label: 'COMMLINKS' },
            { id: 'identity', icon: Fingerprint, label: 'IDENTITY VAULT' },
            { id: 'education', icon: GraduationCap, label: 'EDUCATION' },
            { id: 'finance', icon: Receipt, label: 'FINANCE' },
            { id: 'travel', icon: Plane, label: 'TRAVEL' },
            { id: 'calls', icon: PhoneCall, label: 'CONTACTS' },
            { id: 'shopping', icon: ShoppingCart, label: 'INVENTORY' },
            { id: 'learning', icon: BookOpen, label: 'SKILLS' },
            { id: 'subscriptions', icon: CreditCard, label: 'SUBSCRIPTIONS' },
            { id: 'documents', icon: FolderLock, label: 'DOCUMENTS' },
          ];

          // --- SUB-VIEWS ---
          const DashboardView = () => {
            const pendingTasks = (appData.tasks || []).filter(t => !t.completed).length;
            const urgentBills = (appData.bills || []).filter(b => !b.paid && checkDueStatus(b.dueDate).status !== 'normal').length;
            const learningItems = appData.learning || [];
            const avgLearning = learningItems.reduce((acc, curr) => acc + (curr.progress || 0), 0) / (learningItems.length || 1);

            const [newTask, setNewTask] = useState('');
            const [editTaskId, setEditTaskId] = useState(null);

            // Quick Links State
            const [isAddingQuickLink, setIsAddingQuickLink] = useState(false);
            const [quickLinkData, setQuickLinkData] = useState({ name: '', url: '' });

            const handleAddQuickLink = () => {
              if(!quickLinkData.name || !quickLinkData.url) return;
              let finalUrl = quickLinkData.url.startsWith('http') ? quickLinkData.url : `https://${quickLinkData.url}`;
              const newObj = { id: Date.now(), name: quickLinkData.name, url: finalUrl };
              setAppData({...appData, quickLinks: [...(appData.quickLinks || []), newObj]});
              setIsAddingQuickLink(false);
              setQuickLinkData({name:'', url:''});
            };

            const removeQuickLink = (id) => {
              setAppData({...appData, quickLinks: (appData.quickLinks || []).filter(l => l.id !== id)});
            };

            // --- NEWS TICKER LOGIC (Tamil Nadu Live Feed) ---
            const [newsList, setNewsList] = useState([]);
            const [newsIndex, setNewsIndex] = useState(0);
            const [displayMode, setDisplayMode] = useState('name'); // 'name' | 'news'

            useEffect(() => {
              const fetchNews = async () => {
                try {
                  const rssUrl = encodeURIComponent('https://news.google.com/rss/search?q=தமிழ்நாடு&hl=ta&gl=IN&ceid=IN:ta');
                  const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`);
                  const data = await res.json();
                  if(data.status === 'ok' && data.items.length > 0) {
                     setNewsList(data.items.map(item => item.title.split(' - ')[0]));
                  }
                } catch(e) {
                  console.error("Failed to fetch Live News", e);
                }
              };
              fetchNews();
            }, []);

            useEffect(() => {
              let timer;
              if (displayMode === 'name') {
                // Wait 3 seconds before transitioning from Name to News
                timer = setTimeout(() => {
                  if (newsList.length > 0) setDisplayMode('news');
                }, 3000);
              } else {
                // Cycle through headlines every 12 seconds to allow time for the slide
                timer = setTimeout(() => {
                  setNewsIndex((prev) => (prev + 1) % newsList.length);
                }, 12000);
              }
              return () => clearTimeout(timer);
            }, [displayMode, newsList, newsIndex]);
            // --- END NEWS LOGIC ---

            const addTask = () => {
              if(!newTask) return;
              if (editTaskId) {
                const newTasks = (appData.tasks || []).map(t => t.id === editTaskId ? {...t, title: newTask} : t);
                setAppData({...appData, tasks: newTasks});
                setEditTaskId(null);
              } else {
                const newObj = { id: Date.now(), title: newTask, completed: false, priority: 'normal' };
                setAppData({...appData, tasks: [newObj, ...(appData.tasks || [])]});
              }
              setNewTask('');
            };

            const triggerEdit = (task) => {
               setNewTask(task.title);
               setEditTaskId(task.id);
            };

            return (
              <div className="grid grid-cols-1 md:grid-cols-4 gap-6 animate-fade-in">
                
                {/* Welcome Widget - VICE CITY BANNER WITH LIVE NEWS */}
                <WidgetCard colSpan={2} className="!bg-gradient-to-br from-[#ff00b3] via-[#7000ff] to-[#00f0ff] text-white border-white/20">
                  <div className="flex justify-between items-start h-full">
                    <div className="w-full">
                      <p className="text-white/80 font-bold tracking-[0.2em] text-xs uppercase mb-1">{new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' })}</p>
                      
                      <div className="text-4xl md:text-5xl font-gta font-black italic tracking-tighter drop-shadow-[0_4px_4px_rgba(0,0,0,0.5)]">
                        {getGreeting()}<br/>
                        <div className="relative h-[48px] md:h-[60px] overflow-hidden mt-1 w-full">
                           
                           {/* User Name Layer */}
                           <div className={`absolute inset-0 transition-all duration-700 ease-[cubic-bezier(0.2,0.8,0.2,1)] ${displayMode === 'name' ? 'opacity-100 translate-y-0' : 'opacity-0 -translate-y-full'}`}>
                             <span className="text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-white">{userName}</span>
                           </div>
                           
                           {/* Live Tamil News Layer */}
                           <div className={`absolute inset-0 transition-all duration-700 ease-[cubic-bezier(0.2,0.8,0.2,1)] flex items-center overflow-hidden w-full ${displayMode === 'news' ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-full'}`}>
                             <span key={newsIndex} className="animate-reveal-news text-lg md:text-2xl text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-200 font-sans not-italic font-bold tracking-normal pr-4 shadow-sm" title={newsList[newsIndex]}>
                               <span className="inline-block text-gta-cyan mr-3 uppercase tracking-widest text-[10px] md:text-xs border border-gta-cyan bg-gta-cyan/10 px-2 py-0.5 rounded align-text-bottom shadow-[0_0_8px_rgba(0,240,255,0.4)]">
                                  LIVE
                               </span> 
                               {newsList[newsIndex]}
                             </span>
                           </div>
                        </div>
                      </div>

                      <div className="mt-6 flex flex-wrap gap-3">
                        <div className="bg-black/30 backdrop-blur-md border border-white/20 rounded-lg px-4 py-2 flex items-center gap-2 shadow-lg">
                          <Sun className="w-4 h-4 text-yellow-400" />
                          <span className="font-bold text-sm">28°C / VICE</span>
                        </div>
                        <div className="bg-black/30 backdrop-blur-md border border-white/20 rounded-lg px-4 py-2 flex items-center gap-2 shadow-lg">
                          <Shield className="w-4 h-4 text-gta-cyan" />
                          <span className="font-bold text-sm">SECURE</span>
                        </div>
                      </div>
                    </div>
                  </div>
                </WidgetCard>

                {/* Summary Mini Widgets */}
                <WidgetCard className="flex flex-col justify-between cursor-pointer" onClick={() => setActiveTab('finance')}>
                  <div className="flex justify-between items-center">
                    <div className="p-3 bg-red-500/10 border border-red-500/30 text-red-500 rounded-xl transition-transform group-hover:scale-110 shadow-[0_0_15px_rgba(239,68,68,0.2)]">
                      <Receipt className="w-6 h-6" />
                    </div>
                    {urgentBills > 0 && (
                      <span className="flex h-3 w-3 relative">
                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-500 opacity-75"></span>
                        <span className="relative inline-flex rounded-full h-3 w-3 bg-red-500 shadow-[0_0_8px_#ef4444]"></span>
                      </span>
                    )}
                  </div>
                  <div className="mt-4">
                    <p className="text-4xl font-gta font-black italic">{urgentBills}</p>
                    <p className="text-xs font-bold text-gray-400 tracking-wider uppercase mt-1">Pending Bills</p>
                  </div>
                </WidgetCard>

                <WidgetCard className="flex flex-col justify-between cursor-pointer" onClick={() => setActiveTab('dashboard')}>
                  <div className="flex justify-between items-center">
                     <div className="p-3 bg-gta-cyan/10 border border-gta-cyan/30 text-gta-cyan rounded-xl transition-transform group-hover:scale-110 shadow-[0_0_15px_rgba(0,240,255,0.2)]">
                      <LayoutDashboard className="w-6 h-6" />
                    </div>
                  </div>
                  <div className="mt-4">
                    <p className="text-4xl font-gta font-black italic">{pendingTasks}</p>
                    <p className="text-xs font-bold text-gray-400 tracking-wider uppercase mt-1">Active Tasks</p>
                  </div>
                </WidgetCard>

                {/* Learning Progress Widget */}
                <WidgetCard colSpan={2} className="flex flex-col justify-between cursor-pointer" onClick={() => setActiveTab('learning')}>
                  <div className="flex justify-between items-center mb-6">
                    <h3 className="text-lg font-gta font-bold italic tracking-wider flex items-center gap-2">
                      <BookOpen className="w-5 h-5 text-gta-purple" /> SKILL PROGRESS
                    </h3>
                    <span className="text-sm font-black italic text-gta-cyan drop-shadow-[0_0_5px_rgba(0,240,255,0.5)]">{Math.round(avgLearning)}% AVG</span>
                  </div>
                  <div className="space-y-5">
                    {learningItems.slice(0,2).map(course => (
                      <div key={course.id}>
                        <div className="flex justify-between text-sm mb-2 font-bold">
                          <span className="text-gray-200 uppercase tracking-wide text-xs">{course.course}</span>
                          <span className="text-gta-pink">{course.progress}%</span>
                        </div>
                        <div className="w-full bg-black/60 border border-white/5 rounded-full h-3 p-0.5 overflow-hidden shadow-[inset_0_2px_4px_rgba(0,0,0,0.8)]">
                          <div className="bg-gradient-to-r from-gta-purple to-gta-pink h-full rounded-full transition-all duration-1000 shadow-[0_0_10px_rgba(255,0,179,0.5)]" style={{ width: `${course.progress}%` }}></div>
                        </div>
                      </div>
                    ))}
                    {learningItems.length === 0 && <p className="text-sm text-gray-500 font-medium">NO ACTIVE TRAINING.</p>}
                  </div>
                </WidgetCard>

                {/* Quick Tasks List Widget */}
                <WidgetCard colSpan={2} className="flex flex-col">

                          <button 
                            className={`w-5 h-5 shrink-0 rounded border flex items-center justify-center transition-colors ${task.completed ? 'bg-gta-cyan border-gta-cyan text-black shadow-[0_0_10px_rgba(0,240,255,0.4)]' : 'border-white/20'}`}

                {/* --- QUICK ACCESS DOCK (App Icons) --- */}
                <WidgetCard colSpan={4} className="flex flex-col overflow-visible">

                  {isEditMode && isAddingQuickLink && (
                     <div className="flex flex-col sm:flex-row gap-3 mb-6 animate-fade-in bg-black/40 p-4 rounded-xl border border-white/10 shadow-[inset_0_2px_10px_rgba(0,0,0,0.5)]">
                       <GtaInput placeholder="SITE NAME (e.g., Netflix)" value={quickLinkData.name} onChange={e=>setQuickLinkData({...quickLinkData, name: e.target.value})} className="flex-1" />
                       <GtaInput placeholder="URL (e.g., netflix.com)" value={quickLinkData.url} onChange={e=>setQuickLinkData({...quickLinkData, url: e.target.value})} className="flex-1" />
                       <div className="flex gap-2">
                          <GtaButton onClick={handleAddQuickLink} className="flex-1 sm:flex-none px-6"><Check className="w-4 h-4"/> ADD</GtaButton>
                          <GtaButton variant="secondary" onClick={()=>setIsAddingQuickLink(false)} className="flex-1 sm:flex-none px-4"><X className="w-4 h-4"/></GtaButton>
                       </div>
                     </div>
                  )}

                  <div className="flex gap-4 md:gap-8 overflow-x-auto custom-scrollbar pb-6 pt-2 px-2 items-start">
                     {(appData.quickLinks || []).map(link => {
                        let domain = 'example.com';
                        try { domain = new URL(link.url).hostname; } catch(e) {}
                        
                        return (
                          <div key={link.id} className="relative group flex flex-col items-center gap-3 shrink-0 w-[72px] md:w-20">
                             {isEditMode && (
                               <button onClick={() => removeQuickLink(link.id)} className="absolute -top-2 -right-2 z-20 p-1.5 bg-red-500/90 text-white rounded-full opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity hover:bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.8)]">
                                  <X className="w-3 h-3" />
                               </button>
                             )}
                             <a href={link.url} target="_blank" rel="noopener noreferrer" className="w-[72px] h-[72px] md:w-20 md:h-20 rounded-[1.25rem] bg-black/80 border border-white/10 flex items-center justify-center hover:border-gta-cyan hover:shadow-[0_0_20px_rgba(0,240,255,0.4)] transition-all overflow-hidden relative group-hover:-translate-y-2 shadow-[0_8px_15px_rgba(0,0,0,0.5)]">
                                {/* Auto-fetches the actual Logo of the website using Google's S2 API */}
                                <img src={`https://www.google.com/s2/favicons?domain=${domain}&sz=128`} alt={link.name} className="w-9 h-9 md:w-11 md:h-11 drop-shadow-lg object-contain" />

                     {isEditMode && (

                       </div>

                </WidgetCard>
              </div>

          };

          // --- GENERIC LIST VIEW BUILDER (GTA THEMED) ---
          const GenericListView = ({ title, dataKey, fields, renderCard }) => {
            const [formData, setFormData] = useState({});
            const [editId, setEditId] = useState(null);
            const items = appData[dataKey] || [];
            
            const handleAdd = () => {
              if(!formData[fields[0].key]) return;

              const payload = { ...formData };
              fields.forEach(f => {
                if (f.type === 'select' && !payload[f.key]) {
                   payload[f.key] = f.options[0].value;
                }
              });

              if (editId) {
                setAppData({...appData, [dataKey]: items.map(i => i.id === editId ? {...i, ...payload} : i)});
                setEditId(null);
              } else {
                const newObj = { id: Date.now(), ...payload };
                if (dataKey === 'bills' && !newObj.hasOwnProperty('paid')) newObj.paid = false;
                setAppData({...appData, [dataKey]: [newObj, ...items]});
              }
              setFormData({});
            };

            const handleEdit = (item) => {
              setFormData(item);
              setEditId(item.id);
              window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const remove = (id) => setAppData({...appData, [dataKey]: items.filter(i => i.id !== id)});

            return (
              <div className="space-y-6 animate-fade-in">
                <h2 className="text-3xl font-gta font-black italic tracking-tighter drop-shadow-[0_2px_10px_rgba(255,255,255,0.1)]">{title}</h2>
                <WidgetCard>
                  
                  {isEditMode && (
                    <div className="flex flex-col lg:flex-row gap-3 mb-8 p-4 bg-black/40 border border-white/5 rounded-xl">
                      <div className="flex flex-wrap gap-3 w-full">
                         {fields.map(f => {
                           if (f.type === 'select') {
                             return (
                               <select key={f.key} value={formData[f.key]||f.options[0].value} onChange={e=>setFormData({...formData, [f.key]: e.target.value})} className="flex-auto min-w-[150px] lg:min-w-[200px] bg-black/60 border border-white/10 rounded-lg px-4 py-2.5 text-white outline-none focus:border-gta-cyan text-xs font-bold uppercase tracking-wider shadow-[inset_0_2px_4px_rgba(0,0,0,0.6)]">
                                 {f.options.map(opt => <option key={opt.value} value={opt.value}>{opt.label}</option>)}
                               </select>
                             )
                           }
                           return <GtaInput key={f.key} type={f.type||'text'} value={formData[f.key]||''} onChange={e=>setFormData({...formData, [f.key]: e.target.value})} placeholder={f.placeholder} className="flex-auto min-w-[150px] lg:min-w-[200px]" />
                         })}
                      </div>
                      <div className="flex gap-2 w-full lg:w-auto mt-2 lg:mt-0">
                         <GtaButton onClick={handleAdd} className="flex-1 lg:flex-none lg:px-8">
                           {editId ? <><Check className="w-5 h-5"/> UPDATE</> : <><Plus className="w-5 h-5"/> ADD</>}
                         </GtaButton>
                         {editId && (
                            <GtaButton variant="secondary" onClick={() => {setEditId(null); setFormData({});}} className="flex-1 lg:flex-none">CANCEL</GtaButton>
                         )}
                      </div>
                    </div>
                  )}

                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                    {items.map(item => (
                      <div key={item.id} className="relative group h-full">
                         {renderCard(item)}
                         
                         {isEditMode && (
                           <div className="absolute top-3 right-3 flex gap-2 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity z-20">
                              <button onClick={() => handleEdit(item)} className="p-2.5 md:p-2 bg-black/80 border border-gta-cyan/30 text-gta-cyan hover:bg-gta-cyan hover:text-black rounded transition-colors shadow-lg"><Pencil className="w-4 h-4"/></button>
                              <button onClick={() => remove(item.id)} className="p-2.5 md:p-2 bg-black/80 border border-gta-pink/30 text-gta-pink hover:bg-gta-pink hover:text-white rounded transition-colors shadow-lg"><Trash2 className="w-4 h-4"/></button>
                           </div>
                         )}
                      </div>
                    ))}
                    {items.length === 0 && <p className="text-gray-500 py-4 col-span-full font-bold tracking-wider text-sm">NO DATA FOUND. {isEditMode ? '' : 'ENABLE ADMIN MODE IN SYS SETTINGS TO ADD.'}</p>}
                  </div>
                </WidgetCard>
              </div>
            );
          };

          // --- OTHER THEMED VIEWS ---
          const IdentityVaultView = () => {
             return <GenericListView 
              title="IDENTITY VAULT" dataKey="identity"
              fields={[{key:'type', placeholder:'DOC TYPE (ID/PASSPORT)'}, {key:'number', placeholder:'DOCUMENT NUMBER'}, {key:'name', placeholder:'REGISTERED NAME'}]}
              renderCard={(item) => (
                <div className="p-5 md:p-6 h-full bg-black/60 border border-white/10 rounded-xl overflow-hidden relative group-hover:border-gta-purple/50 transition-colors">
                  <div className="absolute -right-4 -top-4 opacity-10 text-gta-purple transform rotate-12 group-hover:scale-110 transition-transform">
                     <Fingerprint className="w-32 h-32" />
                  </div>
                  <div className="relative z-10">
                    <span className="px-2 py-1 bg-gta-purple/20 text-gta-purple border border-gta-purple/30 text-[10px] font-black italic rounded tracking-widest">{item.type}</span>
                    <h3 className="text-xl font-mono tracking-widest mt-4 text-white font-bold drop-shadow-[0_0_5px_rgba(255,255,255,0.3)] break-all">
                      {maskText(item.number, 'number')}
                    </h3>
                    <p className="mt-2 text-xs text-gray-400 font-bold uppercase tracking-wider text-gta-cyan">HOLDER: <span className="text-gray-200">{maskText(item.name)}</span></p>
                  </div>
                </div>
              )}
            />
          }

          const FinanceView = () => {
             const calculateNextDate = (currentDateStr, cycle) => {
                let date = currentDateStr ? new Date(currentDateStr) : new Date();
                if (isNaN(date.getTime())) date = new Date(); // Safety fallback
                
                // Set hours to noon to prevent timezone date shifting
                date.setHours(12, 0, 0, 0);

                if (cycle === '28 Days') date.setDate(date.getDate() + 28);
                else if (cycle === '1 Month') date.setMonth(date.getMonth() + 1);
                else if (cycle === '3 Months') date.setMonth(date.getMonth() + 3);
                else if (cycle === '1 Year') date.setFullYear(date.getFullYear() + 1);
                
                return date.toISOString().split('T')[0];
             };

             return <GenericListView 
              title="FINANCIAL LEDGER" dataKey="bills"
              fields={[
                {key:'name', placeholder:'BILLING ENTITY'}, 
                {key:'amount', type:'number', placeholder:'AMOUNT (₹)'}, 
                {key:'dueDate', type:'date', placeholder:'DUE DATE'},
                {key:'cycle', type:'select', options: [
                  {value: 'None', label: 'ONE-TIME'},
                  {value: '28 Days', label: '28 DAYS (MOBILE)'},
                  {value: '1 Month', label: 'MONTHLY'},
                  {value: '3 Months', label: 'QUARTERLY'},
                  {value: '1 Year', label: 'YEARLY'}
                ]}
              ]}
              renderCard={(item) => {
                const dueStatus = checkDueStatus(item.dueDate);
                return (
                  <div className={`p-5 md:p-6 h-full bg-black/60 border border-white/10 rounded-xl flex flex-col justify-between transition-colors ${item.paid ? 'opacity-50 grayscale' : 'group-hover:border-gta-pink/50'}`}>
                    <div>
                      <div className="flex justify-between items-start mb-4 pr-16 md:pr-0">
                        <div className="p-2 bg-white/5 border border-white/10 rounded-lg text-gray-400">
                          <Receipt className="w-5 h-5" />
                        </div>
                        {!item.paid && (
                          <span className={`px-2 py-1 rounded text-[10px] font-black italic border ${dueStatus.color} shadow-sm tracking-wider mt-1 md:mt-0`}>
                            {dueStatus.text}
                          </span>
                        )}
                        {item.paid && (
                           <span className="px-2 py-1 rounded text-[10px] font-black italic bg-emerald-500/10 text-emerald-400 border border-emerald-500/30 tracking-wider mt-1 md:mt-0">
                            CLEARED
                          </span>
                        )}
                      </div>
                      <h3 className="text-lg font-bold text-gray-100 uppercase tracking-wide">{item.name}</h3>
                      <p className="text-2xl font-gta font-black italic text-gta-pink drop-shadow-[0_0_8px_rgba(255,0,179,0.4)] mt-1">
                        {maskText(item.amount, 'amount')}
                      </p>
                      {item.cycle && item.cycle !== 'None' && (
                        <p className="text-[9px] text-gta-cyan font-bold tracking-widest uppercase mt-2 border border-gta-cyan/30 bg-gta-cyan/10 px-2 py-0.5 rounded inline-block shadow-[0_0_5px_rgba(0,240,255,0.2)]">
                          CYCLE: {item.cycle}
                        </p>
                      )}
                    </div>
                    <div>
                      <p className="text-xs text-gray-500 mt-4 font-bold tracking-wider uppercase">
                        DUE: {new Date(item.dueDate).toLocaleDateString()}
                      </p>
                      {/* Mark Cleared button remains visible regardless of Edit Mode so users can clear bills! */}
                      {!item.paid && (
                        <button 
                          onClick={(e) => {
                            e.stopPropagation();
                            let newBills;
                            if (item.cycle && item.cycle !== 'None') {
                              // Auto-renew: Calculate next due date and keep it unpaid
                              const nextDate = calculateNextDate(item.dueDate, item.cycle);
                              newBills = (appData.bills||[]).map(b => b.id === item.id ? {...b, dueDate: nextDate, paid: false} : b);
                            } else {
                              // One-time bill: Just mark as paid
                              newBills = (appData.bills||[]).map(b => b.id === item.id ? {...b, paid: true} : b);
                            }
                            setAppData({...appData, bills: newBills});
                            
                            // Visual feedback so the user instantly knows it worked
                            const btn = e.currentTarget;
                            const originalText = btn.innerText;
                            btn.innerText = item.cycle && item.cycle !== 'None' ? "EXTENDED!" : "CLEARED!";
                            btn.style.backgroundColor = "#34d399";
                            btn.style.color = "#000";
                            setTimeout(() => {
                               if (btn) {
                                 btn.innerText = originalText;
                                 btn.style.backgroundColor = "";
                                 btn.style.color = "";
                               }
                            }, 1000);
                          }}
                          className={`mt-4 w-full py-3 md:py-2 border text-white rounded font-bold transition-all duration-300 text-xs tracking-widest uppercase shadow-[0_0_10px_rgba(0,0,0,0.5)] ${item.cycle && item.cycle !== 'None' ? 'bg-gta-purple/20 border-gta-purple/50 hover:bg-gta-purple hover:text-white hover:shadow-[0_0_15px_rgba(112,0,255,0.6)]' : 'bg-white/5 border-white/10 hover:bg-emerald-500 hover:border-emerald-400 hover:text-black'}`}
                        >
                          {item.cycle && item.cycle !== 'None' ? 'RECHARGE & EXTEND' : 'MARK AS CLEARED'}
                        </button>
                      )}
                    </div>
                  </div>
                )
              }}
            />
          }

          const SettingsView = () => (
            <div className="max-w-2xl mx-auto space-y-6 animate-fade-in">
              <h2 className="text-3xl font-gta font-black italic tracking-tighter drop-shadow-[0_2px_10px_rgba(255,255,255,0.1)]">SYSTEM SETTINGS</h2>
              <WidgetCard>
                <div className="space-y-4">
                  
                  {/* --- NEW EDIT/DEFAULT MODE TOGGLE --- */}
                  <div className="flex flex-col sm:flex-row sm:items-center justify-between p-5 bg-black/40 border border-white/5 rounded-xl gap-4 shadow-[inset_0_2px_10px_rgba(0,0,0,0.4)]">
                    <div>
                      <p className="font-bold text-white tracking-wide flex items-center gap-2">
                        SYSTEM ACCESS LEVEL
                        {isEditMode && <span className="w-2 h-2 rounded-full bg-gta-pink animate-pulse shadow-[0_0_8px_#ff00b3]"></span>}
                      </p>
                      <p className="text-xs text-gray-500 uppercase font-semibold mt-1">Unlock Edit, Add, & Delete capabilities</p>
                    </div>
                    <div className="flex items-center gap-3">
                      <span className={`text-xs font-bold ${isEditMode ? 'text-gta-pink' : 'text-gray-500'}`}>
                        {isEditMode ? 'ADMIN (EDIT MODE)' : 'DEFAULT (READ-ONLY)'}
                      </span>
                      <button 
                        onClick={() => setIsEditMode(!isEditMode)}
                        className={`w-16 h-8 shrink-0 rounded-full p-1 transition-colors border shadow-[inset_0_2px_4px_rgba(0,0,0,0.6)] ${isEditMode ? 'bg-gta-pink border-gta-pink' : 'bg-gray-600 border-gray-600'}`}
                      >
                        <div className={`w-6 h-6 rounded-full bg-white shadow-[0_0_10px_rgba(255,255,255,0.8)] transform transition-transform ${isEditMode ? 'translate-x-8' : 'translate-x-0'}`}></div>
                      </button>
                    </div>
                  </div>

                  <div className="flex flex-col sm:flex-row sm:items-center justify-between p-5 bg-black/40 border border-white/5 rounded-xl gap-4">
                    <div>
                      <p className="font-bold text-white tracking-wide">USER ALIAS</p>
                      <p className="text-xs text-gray-500 uppercase font-semibold mt-1">Identification handle</p>
                    </div>
                    <GtaInput 
                      type="text" 
                      value={userName} 
                      onChange={(e) => setUserName(e.target.value)}
                      className="w-full sm:max-w-[200px]"
                      disabled={!isEditMode}
                    />
                  </div>

                  <div className="flex items-center justify-between p-5 bg-black/40 border border-white/5 rounded-xl gap-4">
                    <div>
                      <p className="font-bold text-white tracking-wide">ENVIRONMENT</p>
                      <p className="text-xs text-gray-500 uppercase font-semibold mt-1">Toggle Vice City Time</p>
                    </div>
                    <button 
                      onClick={() => setIsDarkMode(!isDarkMode)}
                      className={`w-16 h-8 shrink-0 rounded-full p-1 transition-colors border shadow-[inset_0_2px_4px_rgba(0,0,0,0.6)] ${isDarkMode ? 'bg-gta-purple border-gta-purple' : 'bg-gta-orange border-gta-orange'}`}
                    >
                      <div className={`w-6 h-6 rounded-full bg-white shadow-[0_0_10px_rgba(255,255,255,0.8)] transform transition-transform ${isDarkMode ? 'translate-x-8' : 'translate-x-0'}`}></div>
                    </button>
                  </div>

                  <div className="flex flex-col sm:flex-row sm:items-center justify-between p-5 bg-black/40 border border-white/5 rounded-xl gap-4">
                     <div>
                      <p className="font-bold text-white tracking-wide">DATA BACKUP</p>
                      <p className="text-xs text-gray-500 uppercase font-semibold mt-1">Export/Import JSON state</p>
                    </div>
                    <div className="flex gap-3 w-full sm:w-auto">
                      <GtaButton variant="secondary" onClick={() => {
                        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(appData));
                        const downloadAnchorNode = document.createElement('a');
                        downloadAnchorNode.setAttribute("href",     dataStr);
                        downloadAnchorNode.setAttribute("download", "lifeos_backup.json");
                        document.body.appendChild(downloadAnchorNode);
                        downloadAnchorNode.click();
                        downloadAnchorNode.remove();
                      }} className="flex-1 sm:flex-none !p-3 justify-center"><Download className="w-5 h-5 text-gta-cyan" /></GtaButton>
                      <GtaButton disabled={!isEditMode} variant="secondary" className={`flex-1 sm:flex-none !p-3 justify-center ${!isEditMode && 'opacity-50 cursor-not-allowed'}`}><Upload className="w-5 h-5 text-gta-pink" /></GtaButton>
                    </div>
                  </div>

                  {isEditMode && (
                    <div className="pt-6 mt-6 border-t border-white/10">
                      <GtaButton 
                        variant="danger"
                        onClick={() => {
                          if(window.confirm('WARNING: Erasing all local database entries. Confirm?')) {
                            setAppData(INITIAL_DATA);
                          }
                        }}
                        className="w-full !py-4 text-lg"
                      >
                        <Trash2 className="w-5 h-5" /> WIPE DATABASE
                      </GtaButton>
                    </div>
                  )}
                </div>
              </WidgetCard>
            </div>
          );

          // Build other views using GenericListView
          const CallsView = () => <GenericListView title="CONTACTS DB" dataKey="calls" fields={[{key:'name', placeholder:'ALIAS'}, {key:'number', placeholder:'COMMLINK NUM'}]} renderCard={(item) => (
             <div className="p-5 h-full bg-black/60 border border-white/10 rounded-xl flex flex-col justify-center group-hover:border-gta-cyan/40 transition-colors">
                 <h3 className="font-bold text-lg text-white uppercase tracking-wide pr-14">{item.name}</h3>

             const cost = Number(item.cost) || 0;
             const budget = Number(item.budget) || 0;
             const shortfall = cost - budget;
             const isFunded = budget >= cost;
             const percent = cost > 0 ? Math.min((budget / cost) * 100, 100) : (budget > 0 ? 100 : 0);

             return (
               <div className="p-5 h-full bg-black/60 border border-white/10 rounded-xl flex flex-col justify-between group-hover:border-gta-pink/40 transition-colors">
                   <div>
                      <div className="flex justify-between items-start mb-3">
                         <ShoppingCart className="text-gta-pink w-6 h-6"/>
                         <span className={`px-2 py-1 border text-[10px] font-black italic rounded tracking-widest uppercase shadow-sm ${isFunded ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/30' : 'bg-red-500/10 text-red-400 border-red-500/30'}`}>
                           {isFunded ? 'FUNDS SECURED' : `SHORTFALL: ${isPrivacyMode ? maskText(shortfall, 'amount') : `₹${shortfall}`}`}
                         </span>
                      </div>
                      <h3 className="font-bold text-lg text-white uppercase tracking-wide leading-tight pr-8">{item.item}</h3>
                      
                      <div className="mt-4 grid grid-cols-2 gap-2 border-t border-white/10 pt-3">

                          <p className="text-gta-cyan font-mono text-sm drop-shadow-[0_0_5px_rgba(0,240,255,0.4)]">
                            {isPrivacyMode ? maskText(cost, 'amount') : `₹${cost}`}
                          </p>
                        </div>
                        <div>
                          <p className="text-[9px] text-gray-500 font-bold tracking-widest uppercase mb-1">AVAILABLE</p>
                          <p className="text-gta-pink font-mono text-sm drop-shadow-[0_0_5px_rgba(255,0,179,0.4)]">
                            {isPrivacyMode ? maskText(budget, 'amount') : `₹${budget}`}
                          </p>
                        </div>
                      </div>
                      
                      <div className="mt-5">

                           <div className={`h-full transition-all duration-1000 ${isFunded ? 'bg-emerald-400 shadow-[0_0_8px_#34d399]' : 'bg-red-500 shadow-[0_0_8px_#ef4444]'}`} style={{ width: `${percent}%` }}></div>
                         </div>
                      </div>
                   </div>
               </div>
             );
          }} />;

          const EducationView = () => <GenericListView title="ACADEMIC LOGS" dataKey="education" fields={[{key:'degree', placeholder:'CERTIFICATION'}, {key:'institution', placeholder:'INSTITUTION'}, {key:'year', placeholder:'YEAR'}, {key:'mark', placeholder:'MARK / CGPA'}, {key:'project', placeholder:'PROJECT NAME'}, {key:'note', placeholder:'NOTES / REMARKS'}]} renderCard={(item) => (
             <div className="p-5 h-full bg-black/60 border border-white/10 rounded-xl flex flex-col justify-between group-hover:border-gta-purple/40 transition-colors">
                 <div>
                    <div className="flex justify-between items-start mb-3">
                       <GraduationCap className="text-gta-purple w-6 h-6"/>
                       {item.mark && <span className="px-2 py-1 bg-gta-cyan/10 text-gta-cyan border border-gta-cyan/30 text-[10px] font-black italic rounded tracking-widest uppercase shadow-[0_0_8px_rgba(0,240,255,0.2)]">{item.mark}</span>}
                    </div>
                    <h3 className="font-bold text-lg text-white uppercase tracking-wide leading-tight pr-8">{item.degree}</h3>
                    <p className="text-gta-cyan font-semibold text-sm uppercase mt-1">{item.institution}</p>
                    
                    {(item.project || item.note) && (
                      <div className="mt-4 space-y-2">
                        {item.project && (
                          <div className="bg-white/5 border border-white/10 p-2.5 rounded-lg">
                            <p className="text-[9px] text-gray-500 font-bold tracking-widest uppercase mb-1">MAJOR PROJECT</p>
                            <p className="text-xs text-gray-200 font-medium leading-relaxed">{item.project}</p>
                          </div>
                        )}
                        {item.note && (
                          <div className="bg-white/5 border border-white/10 p-2.5 rounded-lg">
