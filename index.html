                 <div className="mt-4 border-t border-white/10 pt-3 flex justify-between items-center">
                    <p className="text-xs text-gray-500 font-bold tracking-widest uppercase">CLASS OF {item.year}</p>
                 </div>
             </div>
          )} />;

          const TravelView = () => <GenericListView title="WAYPOINTS" dataKey="travel" fields={[{key:'destination', placeholder:'DESTINATION'}, {key:'date', type:'date'}, {key:'type', placeholder:'MODE (FLIGHT/DRIVE)'}]} renderCard={(item) => (
             <div className="p-5 h-full bg-black/60 border border-white/10 rounded-xl relative overflow-hidden group-hover:border-gta-orange/40 transition-colors">
                 <Plane className="absolute right-[-10%] bottom-[-10%] w-24 h-24 text-gta-orange opacity-10 transform -rotate-45" />
                 <span className="inline-block px-2 py-1 bg-white/10 text-white text-[10px] font-black italic rounded border border-white/20 tracking-widest uppercase">{item.type || 'MISSION'}</span>
                 <h3 className="font-bold text-xl mt-3 text-white uppercase tracking-wide drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] pr-14">{item.destination}</h3>
                 <p className="text-gta-orange font-bold mt-2 text-sm drop-shadow-[0_0_5px_rgba(255,94,0,0.5)]">ETA: {item.date ? new Date(item.date).toLocaleDateString() : 'TBD'}</p>
             </div>
          )} />;

          const LearningView = () => <GenericListView title="SKILL ACQUISITION" dataKey="learning" fields={[{key:'course', placeholder:'SKILL NAME'}, {key:'platform', placeholder:'SOURCE'}, {key:'progress', type:'number', placeholder:'PROGRESS %'}]} renderCard={(item) => (
             <div className="p-5 h-full bg-black/60 border border-white/10 rounded-xl flex flex-col justify-between group-hover:border-gta-cyan/40 transition-colors">
                 <div>
                    <h3 className="font-bold text-lg text-white uppercase tracking-wide leading-tight pr-14">{item.course}</h3>
                    <p className="text-gray-400 text-xs font-bold tracking-wider mt-1 uppercase">{item.platform}</p>
                 </div>
                 <div className="mt-6">
                    <div className="flex justify-between text-[10px] font-black italic mb-1 text-gta-cyan"><span>LINK ESTABLISHED</span><span>{item.progress || 0}%</span></div>
                    <div className="w-full bg-black border border-white/10 rounded-full h-1.5 overflow-hidden"><div className="bg-gta-cyan h-full transition-all duration-1000 shadow-[0_0_8px_#00f0ff]" style={{ width: `${Math.min(100, Math.max(0, item.progress || 0))}%` }}></div></div>
                 </div>
             </div>
          )} />;

          const SubscriptionsView = () => <GenericListView title="RECURRING DEDUCTIONS" dataKey="subscriptions" fields={[{key:'name', placeholder:'SERVICE'}, {key:'cost', type:'number', placeholder:'FEE'}, {key:'cycle', placeholder:'CYCLE'}]} renderCard={(item) => (
             <div className="p-5 h-full bg-black/60 border border-white/10 rounded-xl flex justify-between items-center group-hover:border-gta-pink/40 transition-colors">
                 <div><h3 className="font-bold text-lg text-white uppercase tracking-wide pr-14">{item.name}</h3><p className="text-gray-500 text-xs font-bold tracking-wider mt-1 uppercase">{item.cycle || 'AUTO-DEBIT'}</p></div>
                 <div className="text-right mt-6 md:mt-0"><p className="text-xl font-gta font-black italic text-gta-pink drop-shadow-[0_0_8px_rgba(255,0,179,0.4)]">{maskText(item.cost, 'amount')}</p></div>
             </div>
          )} />;

          const DocumentsView = () => <GenericListView title="SECURE FILES" dataKey="documents" fields={[{key:'name', placeholder:'FILENAME'}, {key:'expiry', type:'date', placeholder:'EXPIRY'}]} renderCard={(item) => (
             <div className="p-5 h-full bg-black/60 border border-white/10 rounded-xl flex flex-col md:flex-row items-start md:items-center gap-4 group-hover:border-gta-purple/40 transition-colors">
                 <div className="p-3 bg-white/5 border border-white/10 text-gray-300 rounded-lg shrink-0"><FolderLock className="w-6 h-6"/></div>
                 <div className="overflow-hidden w-full"><h3 className="font-bold text-white uppercase tracking-wide truncate pr-14 md:pr-0">{item.name}</h3><p className="text-gta-purple text-xs font-bold tracking-wider mt-1 uppercase">EXP: {item.expiry ? new Date(item.expiry).toLocaleDateString() : 'NEVER'}</p></div>
             </div>
          )} />;

          // --- DEDICATED LIVE NEWS MODULE ---
          const NewsView = () => {
            const [newsItems, setNewsItems] = useState([]);
            const [loading, setLoading] = useState(true);
            const [category, setCategory] = useState('TN');

            const categories = {
              'TN': { label: 'TAMIL NADU', query: 'தமிழ்நாடு' },
              'IN': { label: 'INDIA', query: 'இந்தியா' },
              'WRLD': { label: 'WORLD', query: 'உலகம்' }
            };

            useEffect(() => {
              const fetchNews = async () => {
                setLoading(true);
                try {
                  const rssUrl = encodeURIComponent(`https://news.google.com/rss/search?q=${categories[category].query}&hl=ta&gl=IN&ceid=IN:ta`);
                  const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`);
                  const data = await res.json();
                  if(data.status === 'ok') {
                     setNewsItems(data.items);
                  }
                } catch(e) {
                  console.error("Failed to fetch Live News", e);
                }
                setLoading(false);
              };
              fetchNews();
            }, [category]);

            return (
              <div className="space-y-6 animate-fade-in">
                <h2 className="text-3xl font-gta font-black italic tracking-tighter drop-shadow-[0_2px_10px_rgba(255,255,255,0.1)]">LIVE INTELLIGENCE</h2>
                
                <div className="flex gap-2 overflow-x-auto custom-scrollbar pb-2">
                  {Object.entries(categories).map(([key, {label}]) => (
                    <GtaButton 
                      key={key}
                      variant={category === key ? 'primary' : 'secondary'}
                      onClick={() => setCategory(key)}
                      className="whitespace-nowrap flex-1 md:flex-none"
                    >
                      {category === key && <Activity className="w-4 h-4 animate-pulse"/>}
                      {label}
                    </GtaButton>
                  ))}
                </div>

                {loading ? (
                   <div className="flex flex-col items-center justify-center py-20 text-gta-cyan animate-pulse">
                      <Activity className="w-12 h-12 mb-4 drop-shadow-[0_0_10px_rgba(0,240,255,0.8)]" />
                      <p className="font-gta font-bold italic tracking-widest text-lg">ESTABLISHING COMMLINK...</p>
                   </div>
                ) : (
                  <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">
                    {newsItems.map((item, idx) => {
                      const parts = item.title.split(' - ');
                      const source = parts.length > 1 ? parts.pop() : 'NEWS FEED';
                      const title = parts.join(' - ');
                      
                      return (
                        <div key={idx} className="p-5 h-full bg-black/60 border border-white/10 rounded-xl flex flex-col justify-between group hover:border-gta-cyan/40 transition-colors shadow-[0_4px_20px_rgba(0,0,0,0.4)]">
                          <div>
                            <div className="flex justify-between items-start mb-3">
                              <span className="px-2 py-1 bg-gta-purple/20 text-gta-purple border border-gta-purple/30 text-[10px] font-black italic rounded tracking-widest uppercase truncate max-w-[60%]">
                                {source}
                              </span>
                              <span className="text-[10px] text-gray-500 font-bold uppercase tracking-wider">
                                {new Date(item.pubDate).toLocaleDateString()}
                              </span>
                            </div>
                            <h3 className="text-lg font-bold text-white tracking-wide leading-snug mb-4 group-hover:text-gta-cyan transition-colors line-clamp-3">
                               {title}
                            </h3>
                          </div>
                          
                          <a href={item.link} target="_blank" rel="noopener noreferrer" className="mt-4 w-full py-2.5 bg-white/5 border border-white/10 text-white rounded font-bold hover:bg-gta-cyan hover:border-gta-cyan hover:text-black transition-all text-xs tracking-widest uppercase flex items-center justify-center gap-2 shadow-[0_0_10px_rgba(0,0,0,0.5)] group-hover:shadow-[0_0_15px_rgba(0,240,255,0.4)]">
                            READ FULL BRIEF <ExternalLink className="w-4 h-4"/>
                          </a>
                        </div>
                      )
                    })}
                  </div>
                )}
              </div>
            );
          };

          // --- COMMLINKS (WEB LINKS & TASKS) MODULE ---
          const LinksView = () => {
            const [newLink, setNewLink] = useState({ title: '', url: '', priority: 'normal' });
            const [editId, setEditId] = useState(null);

            const addLink = () => {
              if(!newLink.title || !newLink.url) return;
              let finalUrl = newLink.url.startsWith('http') ? newLink.url : `https://${newLink.url}`;
              
              if (editId) {
                setAppData({...appData, links: (appData.links||[]).map(l => l.id === editId ? {...l, title: newLink.title, url: finalUrl, priority: newLink.priority} : l)});
                setEditId(null);
              } else {
                const newObj = { id: Date.now(), title: newLink.title, url: finalUrl, priority: newLink.priority, completed: false };
                setAppData({...appData, links: [newObj, ...(appData.links || [])]});
              }
              setNewLink({ title: '', url: '', priority: 'normal' });
            };

            const triggerEdit = (item) => {
               setNewLink({ title: item.title, url: item.url, priority: item.priority });
               setEditId(item.id);
               window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const toggle = (id) => setAppData({...appData, links: (appData.links||[]).map(i => i.id === id ? {...i, completed: !i.completed} : i)});
            const remove = (id) => setAppData({...appData, links: (appData.links||[]).filter(i => i.id !== id)});

            return (
              <div className="space-y-6 animate-fade-in">
                <h2 className="text-3xl font-gta font-black italic tracking-tighter drop-shadow-[0_2px_10px_rgba(255,255,255,0.1)]">ACTIVE COMMLINKS</h2>
                
                {isEditMode && (
                  <WidgetCard className="mb-6">
                    <div className="flex flex-col lg:flex-row gap-3">
                      <GtaInput value={newLink.title} onChange={e=>setNewLink({...newLink, title: e.target.value})} placeholder="TASK / ACTIVITY NAME (e.g., GitHub PRs)" className="flex-1" />
                      <GtaInput value={newLink.url} onChange={e=>setNewLink({...newLink, url: e.target.value})} placeholder="URL (e.g., github.com)" className="flex-1" />
                      
                      <select 
                        value={newLink.priority} 
                        onChange={e=>setNewLink({...newLink, priority: e.target.value})} 
                        className="bg-black/60 border border-white/10 rounded-lg px-4 py-2.5 text-white outline-none focus:border-gta-cyan font-bold text-xs uppercase tracking-wider"
                      >
                        <option value="normal">NORMAL PRIORITY</option>
                        <option value="high">MUST DO (HIGH)</option>
                      </select>

                      <div className="flex gap-2">
                         <GtaButton onClick={addLink} className="flex-1 lg:flex-none">
                           {editId ? <><Check className="w-5 h-5"/> UPDATE</> : <><Plus className="w-5 h-5"/> ADD</>}
                         </GtaButton>
                         {editId && (
                            <GtaButton variant="secondary" onClick={() => {setEditId(null); setNewLink({ title: '', url: '', priority: 'normal' });}}>CANCEL</GtaButton>
                         )}
                      </div>
                    </div>
                  </WidgetCard>
                )}

                <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                  {(appData.links || []).map(item => {
                    const urlHostname = item.url.replace(/^(?:https?:\/\/)?(?:www\.)?/i, "").split('/')[0];
                    return (
                      <div key={item.id} className="p-5 bg-black/60 border border-white/10 rounded-xl flex flex-col group hover:border-gta-cyan/40 transition-colors relative shadow-lg">
                        <div className="flex items-start justify-between mb-4">
                          <div className="flex items-center gap-3">
                            <button 
                              onClick={() => toggle(item.id)} 
                              className={`w-6 h-6 shrink-0 rounded border flex items-center justify-center transition-colors ${item.completed ? 'bg-gta-cyan border-gta-cyan text-black shadow-[0_0_10px_rgba(0,240,255,0.4)]' : 'border-white/20 hover:border-gta-cyan'}`}
                            >
                              {item.completed && <Check className="w-4 h-4" strokeWidth={3} />}
                            </button>
                            <div>
                              <h3 className={`font-bold uppercase tracking-wide leading-tight ${item.completed ? 'text-gray-500 line-through' : 'text-white'}`}>
                                {item.title}
                              </h3>
                              <div className="flex items-center gap-2 mt-1">
                                {item.priority === 'high' && !item.completed && (
                                  <span className="text-[9px] font-black italic bg-gta-pink/20 text-gta-pink border border-gta-pink/30 px-1.5 py-0.5 rounded tracking-widest uppercase shadow-[0_0_8px_rgba(255,0,179,0.3)]">
                                    MUST DO
                                  </span>
                                )}
                                <span className="text-xs text-gray-500 font-mono flex items-center gap-1">
                                  <LinkIcon className="w-3 h-3"/> {urlHostname}
                                </span>
                              </div>
                            </div>
                          </div>
                          
                          {isEditMode && (
                            <div className="flex gap-2 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity">
                              <button onClick={() => triggerEdit(item)} className="text-gta-cyan hover:text-white transition-colors"><Pencil className="w-4 h-4"/></button>
                              <button onClick={() => remove(item.id)} className="text-gta-pink hover:text-white transition-colors"><Trash2 className="w-4 h-4"/></button>
                            </div>
                          )}
                        </div>

                        <button 
                          onClick={() => setActiveIframeUrl(item.url)}
                          className={`mt-auto w-full py-2.5 border rounded font-bold transition-all text-xs tracking-widest uppercase flex items-center justify-center gap-2 ${item.completed ? 'bg-white/5 border-white/5 text-gray-500 hover:bg-white/10' : 'bg-gta-cyan/10 border-gta-cyan/30 text-gta-cyan hover:bg-gta-cyan hover:text-black shadow-[0_0_10px_rgba(0,240,255,0.2)] hover:shadow-[0_0_20px_rgba(0,240,255,0.6)]'}`}
                        >
                          <Globe className="w-4 h-4"/> ACCESS TERMINAL
                        </button>
                      </div>
                    )
                  })}
                  {(appData.links || []).length === 0 && <p className="text-gray-500 py-4 col-span-full font-bold tracking-wider text-sm">NO COMMLINKS ASSIGNED. {isEditMode ? '' : 'ENABLE ADMIN MODE TO ADD.'}</p>}
                </div>
              </div>
            );
          };

          const renderContent = () => {
            switch (activeTab) {
              case 'dashboard': return <DashboardView />;
              case 'news': return <NewsView />;
              case 'links': return <LinksView />;
              case 'identity': return <IdentityVaultView />;
              case 'finance': return <FinanceView />;
              case 'calls': return <CallsView />;
              case 'shopping': return <ShoppingView />;
              case 'education': return <EducationView />;
              case 'travel': return <TravelView />;
              case 'learning': return <LearningView />;
              case 'subscriptions': return <SubscriptionsView />;
              case 'documents': return <DocumentsView />;
              case 'settings': return <SettingsView />;
              default: return <DashboardView />;
            }
          };

          return (
            <div className="min-h-screen flex overflow-hidden">
              
              {/* SIDEBAR (Desktop) */}
              <aside className={`fixed md:static inset-y-0 left-0 z-50 w-72 bg-[#0a0a0c]/90 backdrop-blur-2xl border-r border-white/5 transform transition-transform duration-300 ease-[cubic-bezier(0.4,0,0.2,1)] ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'} flex flex-col shadow-[4px_0_30px_rgba(0,0,0,0.8)]`}>
                
                <div className="p-6 flex items-center justify-between border-b border-white/5">
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded border border-gta-pink/50 bg-black flex items-center justify-center shadow-[0_0_15px_rgba(255,0,179,0.3)]">
                      <span className="text-white font-gta font-black italic text-xl leading-none text-transparent bg-clip-text bg-gradient-to-br from-gta-pink to-gta-cyan">V</span>
                    </div>
                    <h1 className="text-2xl font-gta font-black italic tracking-tighter text-white drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]">LIFE<span className="text-gta-pink">OS</span></h1>
                  </div>
                  <button className="md:hidden p-2 text-gray-400 hover:text-white" onClick={() => setIsSidebarOpen(false)}>
                    <X className="w-6 h-6" />
                  </button>
                </div>

                <nav className="flex-1 overflow-y-auto py-6 px-4 space-y-1 custom-scrollbar">
                  {navItems.map((item) => {
                    const Icon = item.icon;
                    const isActive = activeTab === item.id;
                    return (
                      <button
                        key={item.id}
                        onClick={() => { setActiveTab(item.id); setIsSidebarOpen(false); }}
                        className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-lg transition-all duration-300 font-bold text-xs tracking-[0.15em] uppercase ${
                          isActive 
                          ? 'bg-gradient-to-r from-gta-pink/20 to-transparent border-l-2 border-gta-pink text-white shadow-[inset_20px_0_30px_rgba(255,0,179,0.1)]' 
                          : 'text-gray-500 hover:bg-white/5 hover:text-gray-200 border-l-2 border-transparent'
                        }`}
                      >
                        <Icon className={`w-5 h-5 ${isActive ? 'text-gta-pink drop-shadow-[0_0_8px_#ff00b3]' : 'opacity-70'}`} />
                        {item.label}
                      </button>
                    );
                  })}
                </nav>

                <div className="p-4 mt-auto border-t border-white/5 bg-black/30">
                   <button
                     onClick={() => { setActiveTab('settings'); setIsSidebarOpen(false); }}
                     className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-lg transition-all font-bold text-xs tracking-[0.15em] uppercase ${activeTab === 'settings' ? 'bg-gradient-to-r from-gray-800 to-transparent border-l-2 border-white text-white' : 'text-gray-500 hover:bg-white/5 hover:text-gray-200 border-l-2 border-transparent'}`}
                   >
                     <Settings className="w-5 h-5" /> SYSTEM CONFIG
                   </button>
                </div>
              </aside>

              {/* MAIN CONTENT AREA */}
              <main className="flex-1 flex flex-col h-screen overflow-hidden relative">
                
                {isSidebarOpen && <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 md:hidden animate-fade-in" onClick={() => setIsSidebarOpen(false)}></div>}

                {/* Top Navbar */}
                <header className="h-20 px-4 md:px-8 flex items-center justify-between sticky top-0 z-30 bg-[#0a0a0c]/80 backdrop-blur-xl border-b border-white/5 shadow-[0_4px_30px_rgba(0,0,0,0.5)]">
                  <div className="flex items-center gap-4">
                    <button className="md:hidden p-2 text-white border border-white/10 bg-black/50 rounded-lg" onClick={() => setIsSidebarOpen(true)}>
                      <Menu className="w-5 h-5" />
                    </button>
                    <div className="hidden md:flex items-center bg-black/50 px-4 py-2.5 rounded border border-white/10 w-80 focus-within:border-gta-cyan transition-colors shadow-[inset_0_2px_4px_rgba(0,0,0,0.6)]">
                      <Search className="w-4 h-4 text-gray-500" />
                      <input type="text" placeholder="QUERY DATABASE..." className="bg-transparent border-none outline-none ml-3 w-full text-xs font-bold tracking-wider text-white placeholder-gray-600 uppercase" />
                    </div>
                  </div>

                  <div className="flex items-center gap-3 md:gap-5">
                    
                    {/* Access Level Status Tag */}
                    <div className={`hidden md:flex items-center gap-2 px-3 py-2 rounded border text-xs font-black italic tracking-widest transition-all shadow-lg ${isEditMode ? 'bg-gta-pink/10 border-gta-pink text-gta-pink shadow-[0_0_10px_rgba(255,0,179,0.2)]' : 'bg-black/50 border-white/10 text-gray-400'}`}>
                      {isEditMode ? 'ADMIN MODE' : 'READ ONLY'}
                    </div>

                    <button onClick={() => setIsPrivacyMode(!isPrivacyMode)} className={`hidden md:flex items-center gap-2 px-3 py-2 rounded border text-xs font-black italic tracking-widest transition-all shadow-lg ${isPrivacyMode ? 'bg-gta-cyan/10 border-gta-cyan text-gta-cyan shadow-[0_0_10px_rgba(0,240,255,0.2)]' : 'bg-black/50 border-white/10 text-gray-400 hover:text-white'}`}>
                      {isPrivacyMode ? <Shield className="w-4 h-4" /> : <Eye className="w-4 h-4" />}
                      {isPrivacyMode ? 'GHOST MODE' : 'PUBLIC'}
                    </button>
                    
                    <div className="relative">
                      <button onClick={() => setIsNotificationsOpen(!isNotificationsOpen)} className="relative p-2.5 bg-black/50 border border-white/10 rounded-lg text-gray-400 hover:text-white transition-colors">
                        <Bell className="w-5 h-5" />
                        {notifications.length > 0 && (
                          <span className="absolute top-2 right-2 w-2 h-2 bg-gta-pink rounded-full shadow-[0_0_8px_#ff00b3] animate-pulse"></span>
                        )}
                      </button>

                      {isNotificationsOpen && (
                        <>
                          <div className="fixed inset-0 cursor-default" onClick={() => setIsNotificationsOpen(false)}></div>
                          
                          <div className="absolute right-0 mt-3 w-72 md:w-80 bg-[#0a0a0c]/95 backdrop-blur-3xl border border-white/10 rounded-xl shadow-[0_10px_40px_rgba(0,0,0,0.8)] z-50 overflow-hidden animate-fade-in origin-top-right">
                            <div className="p-4 border-b border-white/10 flex justify-between items-center bg-white/5">
                              <h3 className="font-gta font-bold italic tracking-widest text-white text-sm">SYSTEM ALERTS</h3>
                              <span className="bg-gta-pink text-white text-[10px] font-black px-2 py-0.5 rounded shadow-[0_0_8px_#ff00b3]">
                                {notifications.length}
                              </span>
                            </div>
                            
                            <div className="max-h-[60vh] overflow-y-auto custom-scrollbar">
                              {notifications.length === 0 ? (
                                <div className="p-6 text-center text-gray-500 font-bold tracking-wider text-xs">NO ACTIVE ALERTS</div>
                              ) : (
                                notifications.map(notif => {
                                  const NIcon = notif.icon;
                                  return (
                                    <div key={notif.id} className="p-4 border-b border-white/5 hover:bg-white/5 transition-colors flex gap-3 cursor-pointer" onClick={() => setIsNotificationsOpen(false)}>
                                      <div className={`p-2 rounded-lg bg-white/5 border border-white/10 h-max ${notif.color}`}>
                                        <NIcon className="w-4 h-4" />
                                      </div>
                                      <div>
                                        <p className={`text-[10px] font-black italic tracking-widest uppercase mb-1 ${notif.color}`}>
                                          {notif.title}
                                        </p>
                                        <p className="text-sm font-bold text-gray-200 mb-1 leading-tight">{notif.message}</p>
                                        <p className="text-xs text-gray-500 tracking-wider font-semibold">{notif.time}</p>
                                      </div>
                                    </div>
                                  )
                                })
                              )}
                            </div>
                          </div>
                        </>
                      )}
                    </div>
                    
                    <div className="w-10 h-10 rounded border border-gta-purple/50 bg-gradient-to-br from-gta-purple to-gta-pink text-white flex items-center justify-center font-gta font-black italic text-lg shadow-[0_0_15px_rgba(112,0,255,0.4)]">
                      {userName.charAt(0).toUpperCase()}
                    </div>
                  </div>
                </header>

                {/* Scrollable Content */}
                <div className="flex-1 overflow-y-auto p-4 md:p-8 pb-28 md:pb-20 custom-scrollbar relative z-10">
                  <div className="max-w-7xl mx-auto">
                    {renderContent()}
                  </div>
                </div>
              </main>

              {/* MOBILE BOTTOM NAVIGATION */}
              <nav className="md:hidden fixed bottom-0 left-0 right-0 z-50 bg-[#0a0a0c]/95 backdrop-blur-xl border-t border-white/10 shadow-[0_-5px_20px_rgba(0,0,0,0.8)] pb-2">
                <div className="flex items-center justify-around p-2 gap-1">
                  {[
                    { id: 'dashboard', icon: LayoutDashboard, label: 'HUB' },
                    { id: 'links', icon: Globe, label: 'TASKS' },
                    { id: 'news', icon: Newspaper, label: 'NEWS' },
                    { id: 'finance', icon: Receipt, label: 'FUNDS' },
                    { id: 'settings', icon: Settings, label: 'SYS' }
                  ].map(item => {
                    const Icon = item.icon;
                    const isActive = activeTab === item.id;
                    return (
                      <button key={item.id} onClick={() => setActiveTab(item.id)} className={`flex flex-1 flex-col items-center justify-center h-12 rounded-lg transition-colors ${isActive ? 'text-gta-cyan' : 'text-gray-500 hover:text-gray-300'}`}>
                        <Icon className={`w-5 h-5 mb-1 ${isActive ? 'drop-shadow-[0_0_8px_#00f0ff]' : ''}`} />
                        <span className="text-[9px] font-black italic tracking-widest uppercase">{item.label}</span>
                      </button>
                    )
                  })}
                </div>
              </nav>

              {/* Branding Footer */}
              <div className="hidden md:block fixed bottom-4 right-6 z-50">
                <a href="https://a-santhosh-hub.github.io/in/" target="_blank" rel="noopener noreferrer" className="text-[10px] font-black italic tracking-widest text-white/40 hover:text-gta-cyan transition-colors bg-black/60 backdrop-blur-md px-3 py-1.5 rounded border border-white/10 shadow-[0_0_10px_rgba(0,0,0,0.5)]">
                  DEV BY SANTHOSH A
                </a>
              </div>

              {/* IFRAME MODAL / IN-APP BROWSER */}
              {activeIframeUrl && (
                <div className="fixed inset-0 z-[100] bg-black/95 backdrop-blur-md flex flex-col animate-fade-in">
                  <div className="h-16 border-b border-white/10 flex items-center justify-between px-4 bg-[#0a0a0c] shadow-[0_4px_20px_rgba(0,0,0,0.8)] z-10">
                    <div className="flex items-center gap-3 overflow-hidden">
                      <div className="w-2 h-8 bg-gta-cyan rounded-full shadow-[0_0_8px_#00f0ff]"></div>
                      <span className="text-white font-gta font-bold italic tracking-wider truncate text-sm md:text-base">{activeIframeUrl}</span>
                    </div>
                    <div className="flex items-center gap-4 shrink-0 pl-2">
                      <a href={activeIframeUrl} target="_blank" rel="noopener noreferrer" className="flex items-center gap-2 text-[10px] md:text-xs font-black italic tracking-widest bg-white/10 hover:bg-white/20 text-white px-3 py-2 rounded transition-colors uppercase border border-white/10">
                        <ExternalLink className="w-4 h-4"/> <span className="hidden md:inline">OPEN EXTERNALLY</span>
                      </a>
                      <button onClick={() => setActiveIframeUrl(null)} className="p-2 bg-red-500/20 text-red-500 border border-red-500/30 hover:bg-red-500 hover:text-white rounded transition-colors shadow-[0_0_10px_rgba(239,68,68,0.3)]">
                        <X className="w-5 h-5"/>
                      </button>
                    </div>
                  </div>
                  <div className="flex-1 w-full h-full relative bg-gray-900">
                    <div className="absolute inset-0 flex flex-col items-center justify-center p-8 text-center z-0">
                      <Globe className="w-16 h-16 text-white/10 mb-4 animate-pulse"/>
                      <p className="text-gray-400 font-gta font-bold tracking-widest text-sm mb-2 uppercase">SECURE CONNECTION INITIATED</p>
                      <p className="text-gray-600 text-xs font-semibold max-w-md">If the target database (like GitHub) refuses the embedded connection frame for security protocols, please utilize the "Open Externally" command above.</p>
                    </div>
                    <iframe 
                      src={activeIframeUrl} 
                      className="absolute inset-0 w-full h-full border-none z-10" 
                      sandbox="allow-same-origin allow-scripts allow-popups allow-forms"
                      title="Internal Web Viewer"
                    ></iframe>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
